name: 汽车金融推送(三引擎)
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - name: 恢复去重缓存
        uses: actions/cache@v3
        with:
          path: sent_cache.txt
          key: sent-cache-${{ github.run_id }}
          restore-keys: sent-cache-
      - run: python bot_v10.py
      - name: 保存去重缓存
        uses: actions/cache@v3
        with:
          path: sent_cache.txt
          key: sent-cache-${{ github.run_id }}

name: 每日推送汽车金融资讯
on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 6 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: 设置Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests
      - name: 运行推送
        run: python bot_v2.py

name: 每30分钟推送汽车金融资讯
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装依赖
        run: pip install requests
      - name: 运行推送
        run: python bot_v4.py
